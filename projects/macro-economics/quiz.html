var ch6new = [
  {ch:6, q:"经济增长的真实含义是人均收入的持续增长。以人均量形式表示的生产函数y=f(k)表明（  ）。", opts:["A. 劳动不是经济增长的决定因素","B. 人均产出是劳动生产率的函数","C. 人均产出取决于人均资本存量","D. 生产函数符合规模报酬递增特征"], ans:"C", exp:"y=f(k)直接表明人均产出(y)由人均资本(k)决定——这是索洛模型的核心逻辑起点。A错误：劳动是自变量；B混淆了y=f(k)与y=f(L)；D错误：索洛生产函数是规模报酬不变的。"},
  {ch:6, q:"2008年金融危机之后，欧美国家致力于提高储蓄率。根据索罗增长模型，这些国家新的稳态和初始稳态相比，资本的边际产量（  ），经济增长率（  ）。", opts:["A. 相同；降低","B. 降低；更高","C. 更低；相同","D. 更高；相同"], ans:"C", exp:"s↑→k*↑→MPK↓（边际报酬递减）。但长期经济增长率由技术进步g决定，与储蓄率无关——s只有水平效应没有增长效应。这是索洛模型最核心的结论！"},
  {ch:6, q:"假设甲乙两个经济体相同，只是甲国的人均资本量高于乙国。两个经济体的生产函数都显示资本的边际产量递减。那么额外的人均资本存量所导致的人均产出（  ）。", opts:["A. 甲国更高","B. 乙国更高","C. 两国增加量相同","D. 只有甲国会增加"], ans:"B", exp:"MPK递减→k较低的穷国（乙）MPK更高→同样增一单位k→乙国产出增幅更大。这就是收敛假说的微观基础。"},
  {ch:6, q:"第二次世界大战摧毁德国和日本的物质资本，按照索洛增长模型的预测，在储蓄率不变的情况下，这两个国家的产出将会增长且新的稳态将会接近（  ）。", opts:["A. 比之前更高的人均产出水平","B. 和之前的人均产出相同","C. 比之前的人均产出更低","D. 资本的黄金律水平"], ans:"B", exp:"s、δ、n、g未变→稳态k*、y*不变。战后K被摧毁→k<k*→快速资本积累→回到原稳态。索洛完美预测了德日'经济奇迹'本质上是回归稳态的追赶过程。"},
  {ch:6, q:"假设某个孤立国处在没有人口增长和技术进步的稳态，且资本的边际产量低于折旧率，则（  ）。", opts:["A. 经济遵循黄金律","B. 人均稳态消费可能高于低储蓄率的稳态","C. 人均稳态消费可能高于高储蓄率稳态","D. 为实现黄金律稳态，折旧率应该被取消"], ans:"C", exp:"MPK<δ→资本过度积累→k*>k_gold→降低储蓄率可以减少维持过剩资本的成本，释放资源用于消费→c*反而提高。这正是'动态无效率'。"},
  {ch:6, q:"假设某个孤立国没有人口增长和技术进步，该经济体稳态的资本边际产量是0.125，折旧率是0.1，储蓄率是0.225，那么稳态的资本存量（  ）。", opts:["A. 大于黄金律水平","B. 小于黄金律水平","C. 等于黄金律水平","D. 可能大于也可能小于黄金律水平"], ans:"B", exp:"无n和g时黄金律MPK=δ=0.10。当前MPK=0.125>0.10→资本边际产出仍高于折旧→资本太少→k*<k_gold。口诀：MPK>δ+n+g→资本不足，应多储蓄。"},
  {ch:6, q:"假设某个孤立国处于稳态且资本存量高于黄金律水平，且该国没有人口增长和技术进步。如果储蓄率下降，（  ）。", opts:["A. 产出、消费、投资和折旧都会减少","B. 产出和投资会减少，消费和折旧会增加","C. 产出和投资会减少，消费和折旧会增加然后减少，但最终接近高于其初始状态的水平","D. 产出、投资和折旧会减少，消费会增加然后减少，但最终接近高于其初始状态的水平"], ans:"D", exp:"s↓→I↓→k↓→Y↓、δk↓。c=(1-s)y：s↓直接增消费份额但y↓减消费量→c先↑后↓，新稳态c*高于初始（向黄金律移动）。"},
  {ch:6, q:"假设有甲和乙两个国家——甲国有10亿人口，乙国有1000万人口。这两个国家在其它方面均相同，则稳态的人均产出水平（  ），稳态的人均产出增长率（  ）。", opts:["A. 相同；相同","B. 甲国更高；甲国更高","C. 乙国更高；乙国更高","D. 甲国更高；乙国更高"], ans:"A", exp:"人口规模L不影响人均稳态值。y*由s、δ、n、g决定，与L大小无关——规模报酬不变+没有规模效应的必然结果。"},
  {ch:6, q:"随着工业化和城市化的推进，欧美发达国家逐渐从人口增长的稳态转变为人口增长率为零。在新的稳态，总产出的增长会（  ），人均产出的增长会（  ）。", opts:["A. 更低；更低","B. 更低；和以前一样","C. 更高；比之前高","D. 更高；更低"], ans:"B", exp:"总产出增长率=n+g，n↓→Y增长率↓。人均产出增长率=g，n的变化不影响。但n↓→k*↑→y*水平↑（水平效应）。"}
];

  {ch:"预测", q:"在古典模型中，政府增加购买支出G且不增税（发债融资）。长期中，（  ）。", opts:["A. 产出Y增加，利率r下降","B. 产出Y增加，利率r上升","C. 产出Y不变，利率r下降","D. 产出Y不变，利率r上升，投资I被挤出"], ans:"D", exp:"古典模型中Y由供给侧决定。G↑→S_public↓→国民储蓄↓→r↑→I↓（挤出效应）。古典二分法核心应用。"},

  {ch:"预测", q:"实际利率保持在3%，货币供给增长率从5%永久提高到8%，长期中名义利率将（  ）。", opts:["A. 从8%上升到11%","B. 从8%上升到8%（不变）","C. 从3%上升到6%","D. 从5%上升到8%"], ans:"A", exp:"i=r+π。初始π=5%→i=8%；新π=8%→i=11%。r由实体经济决定，费雪效应为一对一传导。"},

  {ch:"预测", q:"当经济处于流动性陷阱时，（  ）。", opts:["A. 货币政策无效，财政政策完全有效","B. 财政政策无效，货币政策完全有效","C. 两者都无效","D. 两者都完全有效"], ans:"A", exp:"流动性陷阱中r极低→LM水平段→货币增发无法进一步降低r→货币政策无效。财政扩张不抬高利率→无挤出→财政政策完全有效。"},

// 合并所有题目
questions = ch6first.concat(ch6new).concat(ch1to5).concat(examMC);

// ===== 渲染题目 =====
var answered = {};
var container = document.getElementById('questionsContainer');
var totalEl = document.getElementById('totalQ');
totalEl.textContent = questions.length;

// 章节筛选按钮
var chapters = [];
var seen = {};
questions.forEach(function(q){
  var ch = String(q.ch);
  if(!seen[ch]){seen[ch]=true;chapters.push(ch);}
});
chapters.sort(function(a,b){
  if(a==='预测') return 1;
  if(b==='预测') return -1;
  return parseInt(a)-parseInt(b);
});
var filterDiv = document.getElementById('chapterFilter');
chapters.forEach(function(ch){
  var btn = document.createElement('button');
  btn.textContent = ch==='预测' ? '🎯 预测卷' : '第'+ch+'章';
  btn.setAttribute('data-ch', ch);
  btn.onclick = function(){filterChapter(ch, this);};
  filterDiv.appendChild(btn);
});

function filterChapter(ch, btn){
  var buttons = filterDiv.querySelectorAll('button');
  var isActive = btn.classList.contains('active');
  buttons.forEach(function(b){b.classList.remove('active');});
  if(!isActive){
    btn.classList.add('active');
    container.querySelectorAll('.q-card').forEach(function(card){
      if(card.getAttribute('data-ch') === ch){
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
  } else {
    container.querySelectorAll('.q-card').forEach(function(card){
      card.style.display = '';
    });
  }
}

// 渲染所有题目
questions.forEach(function(q, i){
  var card = document.createElement('div');
  card.className = 'q-card';
  card.setAttribute('data-ch', String(q.ch));
  card.setAttribute('data-idx', i);
  
  var chLabel = q.ch === '预测' ? '🎯预测卷' : '第'+q.ch+'章';
  var html = '<span class="q-num">'+chLabel+' · 第'+(i+1)+'题</span>';
  html += '<div class="q-text">'+q.q+'</div>';
  html += '<div class="options">';
  var labels = ['A','B','C','D'];
  q.opts.forEach(function(opt, j){
    html += '<div class="opt" data-idx="'+i+'" data-val="'+labels[j]+'" onclick="pickAnswer(this,\''+labels[j]+'\','+i+')">'+opt+'</div>';
  });
  html += '</div>';
  html += '<div class="feedback" id="fb'+i+'"></div>';
  html += '<div class="explanation" id="exp'+i+'">💡 '+q.exp+'</div>';
  
  card.innerHTML = html;
  container.appendChild(card);
});

function pickAnswer(optEl, userVal, idx){
  if(answered[idx]) return;
  answered[idx] = true;
  var q = questions[idx];
  var card = optEl.closest('.q-card');
  var allOpts = card.querySelectorAll('.opt');
  
  allOpts.forEach(function(o){o.classList.add('done');});
  
  if(userVal === q.ans){
    optEl.classList.add('pick-correct');
    card.classList.add('answered-correct');
    document.getElementById('fb'+idx).textContent = '✅ 正确！';
    document.getElementById('fb'+idx).className = 'feedback correct show';
  } else {
    optEl.classList.add('pick-wrong');
    card.classList.add('answered-wrong');
    allOpts.forEach(function(o){
      if(o.getAttribute('data-val') === q.ans) o.classList.add('show-answer');
    });
    document.getElementById('fb'+idx).textContent = '❌ 错误！正确答案是 '+q.ans;
    document.getElementById('fb'+idx).className = 'feedback wrong show';
  }
  document.getElementById('exp'+idx).className = 'explanation show';
  updateScore();
}

function updateScore(){
  var total = Object.keys(answered).length;
  var correct = 0;
  for(var key in answered){
    if(answered[key]){
      var idx = parseInt(key);
      var card = document.querySelector('[data-idx="'+idx+'"]');
      if(card && card.classList.contains('answered-correct')) correct++;
    }
  }
  document.getElementById('scoreDisplay').textContent = correct+'/'+total;
  var pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('percentDisplay').textContent = pct+'% ('+correct+'✓ / '+(total-correct)+'✗)';
}

function resetAll(){
  answered = {};
  document.querySelectorAll('.q-card').forEach(function(card){
    card.classList.remove('answered-correct','answered-wrong');
    card.querySelectorAll('.opt').forEach(function(o){
      o.classList.remove('done','pick-correct','pick-wrong','show-answer');
    });
    card.querySelectorAll('.feedback').forEach(function(f){
      f.className = 'feedback';f.textContent='';
    });
    card.querySelectorAll('.explanation').forEach(function(e){
      e.className = 'explanation';
    });
  });
  updateScore();
}

function showAllAnswers(){
  questions.forEach(function(q, i){
    if(!answered[i]){
      answered[i] = true;
      var card = document.querySelector('[data-idx="'+i+'"]');
      card.querySelectorAll('.opt').forEach(function(o){
        o.classList.add('done');
        if(o.getAttribute('data-val') === q.ans) o.classList.add('show-answer');
      });
      document.getElementById('exp'+i).className = 'explanation show';
    }
  });
  updateScore();
}

updateScore();
</script>
