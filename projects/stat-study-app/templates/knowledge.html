{% extends "base.html" %}
{% block title %}知识库 · 数理统计B{% endblock %}

{% block content %}
<div class="flex gap-6">
    <!-- 左侧导航树 -->
    <aside class="w-64 shrink-0">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sticky top-20">
            <h3 class="font-semibold text-gray-800 mb-3">📑 章节导航</h3>
            <nav class="space-y-1" id="chapter-nav"></nav>

            <div class="mt-4 pt-4 border-t border-gray-100">
                <input type="text" id="search-input" placeholder="🔍 搜索知识点..."
                       class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
            </div>
            <div class="mt-3">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                    <input type="checkbox" id="show-mastered-only" class="rounded"> 仅显示未掌握
                </label>
            </div>
        </div>
    </aside>

    <!-- 右侧内容 -->
    <div class="flex-1">
        <!-- 章节标题 -->
        <div id="chapter-header" class="mb-4"></div>

        <!-- 知识点卡片 -->
        <div id="knowledge-cards" class="space-y-4"></div>

        <!-- 知识点详情面板 -->
        <div id="detail-panel" class="hidden bg-white rounded-xl shadow-sm border border-indigo-200 p-6 mt-4">
            <div class="flex items-start justify-between mb-3">
                <h3 class="text-lg font-bold text-gray-800" id="detail-title"></h3>
                <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <div class="text-xs text-indigo-500 mb-3" id="detail-summary"></div>
            <div class="prose prose-sm max-w-none text-gray-700 leading-relaxed" id="detail-content"></div>
            <div class="mt-4 flex flex-wrap gap-2" id="detail-keypoints"></div>
            <div class="mt-3 p-3 bg-red-50 border border-red-200 rounded-lg hidden" id="detail-mistakes"></div>
        </div>

        <!-- 公式区域 -->
        <div id="formulas-section" class="mt-6"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let structure = null;
let formulas = null;
let currentChapter = 1;
let masteredTopics = JSON.parse(localStorage.getItem('mastered_topics') || '[]');

Promise.all([
    fetch('/api/structure').then(r => r.json()),
    fetch('/api/formulas').then(r => r.json())
]).then(([s, f]) => {
    structure = s;
    formulas = f;
    renderNav();
    renderChapter(1);
});

function renderNav() {
    const nav = document.getElementById('chapter-nav');
    nav.innerHTML = structure.chapters.map(ch => `
        <button onclick="renderChapter(${ch.id})" data-ch="${ch.id}"
            class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors hover:bg-gray-100
                   ${ch.id === currentChapter ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600'}">
            第${ch.id}章 ${ch.title}
        </button>
    `).join('');
}

function renderChapter(chId) {
    currentChapter = chId;
    renderNav(); // 更新高亮

    const ch = structure.chapters.find(c => c.id === chId);
    const chFormulas = formulas.chapters[String(chId)];

    // 章节标题
    document.getElementById('chapter-header').innerHTML = `
        <h1 class="text-xl font-bold text-gray-800">第${ch.id}章 ${ch.title}</h1>
        <p class="text-sm text-gray-500 mt-1">教材第${ch.pages}页 · 共${ch.sections.length}节</p>
    `;

    // 知识点卡片
    let cardsHtml = '';
    ch.sections.forEach(sec => {
        sec.topics.forEach(topic => {
            const topicId = `${ch.id}.${sec.id}.${topic.name}`;
            const isMastered = masteredTopics.includes(topicId);
            cardsHtml += `
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 cursor-pointer hover:border-indigo-300 hover:shadow transition-all ${isMastered ? 'opacity-60' : ''}"
                 data-topic-id="${topicId}" data-search-text="${topic.name} ${sec.title}"
                 onclick="loadTopicDetail('${ch.id}', '${sec.id}', '${encodeURIComponent(topic.name)}', '${topicId}')">
                <div class="flex items-start justify-between">
                    <div>
                        <span class="text-xs text-indigo-500 font-medium">§${sec.id}</span>
                        <h3 class="font-medium text-gray-800 mt-1">📖 ${topic.name}</h3>
                        <p class="text-xs text-gray-400 mt-1">课本第${topic.textbook_page}页 · 点击查看详情</p>
                    </div>
                    <button onclick="event.stopPropagation(); toggleMastered('${topicId}', this)"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-colors
                               ${isMastered ? 'bg-green-50 text-green-700 border-green-300' : 'bg-gray-50 text-gray-500 border-gray-200 hover:border-indigo-300'}">
                        ${isMastered ? '✓ 已掌握' : '○ 待复习'}
                    </button>
                </div>
            </div>`;
        });
    });
    document.getElementById('knowledge-cards').innerHTML = cardsHtml;

    // 公式区域
    if (chFormulas && chFormulas.formulas.length > 0) {
        document.getElementById('formulas-section').innerHTML = `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
            <h2 class="font-semibold text-gray-800 mb-3">📐 重要公式</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                ${chFormulas.formulas.map(f => `
                <div class="p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <div class="text-sm font-medium text-gray-700 mb-1">${f.name}</div>
                    <div class="font-mono text-sm text-indigo-700 overflow-x-auto">\\(${f.latex}\\)</div>
                    ${f.note ? `<div class="text-xs text-gray-400 mt-1">${f.note}</div>` : ''}
                </div>
                `).join('')}
            </div>
        </div>`;
        // 渲染LaTeX
        if (window.MathJax) MathJax.typesetPromise();
    } else {
        document.getElementById('formulas-section').innerHTML = '';
    }
}

function toggleMastered(topicId, btn) {
    if (masteredTopics.includes(topicId)) {
        masteredTopics = masteredTopics.filter(t => t !== topicId);
        btn.textContent = '○ 待复习';
        btn.className = 'px-3 py-1 rounded-full text-xs font-medium border bg-gray-50 text-gray-500 border-gray-200';
    } else {
        masteredTopics.push(topicId);
        btn.textContent = '✓ 已掌握';
        btn.className = 'px-3 py-1 rounded-full text-xs font-medium border bg-green-50 text-green-700 border-green-300';
    }
    localStorage.setItem('mastered_topics', JSON.stringify(masteredTopics));
    btn.closest('.bg-white').classList.toggle('opacity-60');
}

// 搜索功能
document.getElementById('search-input').addEventListener('input', function(e) {
    const query = e.target.value.toLowerCase();
    document.querySelectorAll('#knowledge-cards > div').forEach(card => {
        const text = card.dataset.searchText.toLowerCase();
        card.style.display = text.includes(query) ? '' : 'none';
    });
});

document.getElementById('show-mastered-only').addEventListener('change', function(e) {
    document.querySelectorAll('#knowledge-cards > div').forEach(card => {
        if (e.target.checked && card.classList.contains('opacity-60')) {
            card.style.display = 'none';
        } else {
            card.style.display = '';
        }
    });
});

// 知识点详细讲解
function loadTopicDetail(chId, secId, topicName, topicId) {
    const name = decodeURIComponent(topicName);

    // 先尝试从API加载
    fetch(`/api/knowledge?chapter=${chId}&section=${secId}&topic=${encodeURIComponent(name)}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                // 没有详细内容，显示课本引用
                showDetailPanel(name, '请在课本中查看详细内容。', [], '', null);
                return;
            }
            showDetailPanel(name, data.detail || data.summary || '', data.key_points || [], data.summary || '', data.common_mistakes || null);
        })
        .catch(() => {
            showDetailPanel(name, '加载失败，请查看课本。', [], '', null);
        });
}

function showDetailPanel(title, content, keyPoints, summary, mistakes) {
    const panel = document.getElementById('detail-panel');
    document.getElementById('detail-title').textContent = '📖 ' + title;
    document.getElementById('detail-summary').textContent = summary;
    document.getElementById('detail-content').innerHTML = formatContent(content);

    // 关键点
    const kp = document.getElementById('detail-keypoints');
    if (keyPoints && keyPoints.length > 0) {
        kp.innerHTML = '<span class="text-xs font-semibold text-gray-500 mr-2">🔑 关键点：</span>' +
            keyPoints.map(k => `<span class="text-xs px-2 py-1 bg-indigo-50 text-indigo-700 rounded-full">${k}</span>`).join('');
        kp.classList.remove('hidden');
    } else {
        kp.classList.add('hidden');
    }

    // 常见错误
    const cm = document.getElementById('detail-mistakes');
    if (mistakes) {
        cm.innerHTML = `<span class="text-xs font-semibold text-red-600">⚠️ 常见错误：</span> ${mistakes}`;
        cm.classList.remove('hidden');
    } else {
        cm.classList.add('hidden');
    }

    panel.classList.remove('hidden');
    panel.scrollIntoView({behavior: 'smooth', block: 'center'});
}

function closeDetail() {
    document.getElementById('detail-panel').classList.add('hidden');
}

function formatContent(text) {
    if (!text) return '';
    return text
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/✅/g, '<span class="text-green-600">✅</span>')
        .replace(/❌/g, '<span class="text-red-600">❌</span>')
        .replace(/→/g, '→');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
{% endblock %}
